{% extends "base.html" %}
{% block title %}Login — Crystal Presentes{% endblock %}
{% block body %}

<div class="min-h-screen bg-crystal-bg flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/static/img/logo-crystal-presentes.jpeg" alt="Crystal Presentes"
           class="h-20 w-auto rounded-2xl object-contain mx-auto mb-4 shadow-lg">
      <p class="text-crystal-muted text-sm mt-1">Painel Administrativo</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-crystal-border p-6">

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-crystal-text mb-1.5">E-mail</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full px-4 py-2.5 rounded-xl border border-crystal-border bg-crystal-bg
                        text-crystal-text text-sm focus:outline-none focus:ring-2 focus:ring-crystal-primary/40
                        focus:border-crystal-primary transition-colors"
                 placeholder="seu@email.com" />
        </div>

        <div>
          <label class="block text-sm font-medium text-crystal-text mb-1.5">Senha</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-2.5 rounded-xl border border-crystal-border bg-crystal-bg
                        text-crystal-text text-sm focus:outline-none focus:ring-2 focus:ring-crystal-primary/40
                        focus:border-crystal-primary transition-colors"
                 placeholder="••••••••" />
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-crystal-primary hover:bg-crystal-hover text-white font-semibold
                       rounded-xl transition-colors text-sm shadow-sm shadow-crystal-primary/30 mt-2">
          Entrar
        </button>

      </form>
    </div>

    <div class="text-center mt-6">
      <a href="/" class="inline-flex items-center gap-1.5 text-crystal-muted hover:text-crystal-text text-xs transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Voltar ao início
      </a>
      <p class="text-crystal-muted text-xs mt-3">Crystal Presentes &copy; {{ 2026 }}</p>
    </div>
  </div>
</div>

{% endblock %}
